name: client
description: "TrustRAG - Trustworthy RAG Knowledge Workbench"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # HTTP + API
  dio: ^5.8.0

  # Storage
  shared_preferences: ^2.5.3

  # HTTP SSE streaming
  http: ^1.3.0

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7
  file_picker: ^9.2.1
  syncfusion_flutter_pdfviewer: ^33.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
