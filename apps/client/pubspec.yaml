name: client
description: "TrustRAG - Trustworthy RAG Knowledge Workbench"
publish_to: 'none'
version: 0.1.2+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # HTTP + API
  dio: ^5.8.0

  # Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP SSE streaming
  http: ^1.3.0

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7
  file_picker: ^9.2.1
  syncfusion_flutter_pdfviewer: ^33.2.6
  streaming_markdown: ^0.0.7
  dio_cache_interceptor: ^4.0.6
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/google_fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
