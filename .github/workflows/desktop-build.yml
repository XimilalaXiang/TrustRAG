name: Multi-Platform Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Linux desktop
        working-directory: apps/client
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ../../../../../trustrag-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-linux-x64
          path: apps/client/trustrag-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows desktop
        working-directory: apps/client
        run: flutter build windows --release

      - name: Package Windows build
        run: |
          Compress-Archive -Path apps/client/build/windows/x64/runner/Release/* -DestinationPath apps/client/trustrag-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-windows-x64
          path: apps/client/trustrag-windows-x64.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Android APK
        working-directory: apps/client
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-android
          path: apps/client/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Web
        working-directory: apps/client
        run: flutter build web --release

      - name: Package Web build
        run: |
          cd apps/client/build/web
          tar czf ../../trustrag-web.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-web
          path: apps/client/trustrag-web.tar.gz

  release:
    needs: [build-linux, build-windows, build-android, build-web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/trustrag-linux-x64/trustrag-linux-x64.tar.gz
            artifacts/trustrag-windows-x64/trustrag-windows-x64.zip
            artifacts/trustrag-android/app-release.apk
            artifacts/trustrag-web/trustrag-web.tar.gz
          generate_release_notes: true
