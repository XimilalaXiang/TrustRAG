name: Test Build

on:
  push:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check backend (postgres)
        working-directory: backend
        run: cargo check --features postgres

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter analyze
        working-directory: apps/client
        run: flutter analyze --no-fatal-infos

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            build-steps: |
              sudo apt-get update
              sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Rust backend (desktop mode)
        working-directory: backend
        run: cargo build --release --no-default-features --features desktop

      - name: Build Flutter desktop (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/client
        run: flutter build linux --release

      - name: Bundle backend (Linux)
        if: runner.os == 'Linux'
        run: |
          cp backend/target/release/trustrag-backend apps/client/build/linux/x64/release/bundle/
          cd apps/client/build/linux/x64/release/bundle
          tar czf ../../../../../trustrag-linux-x64.tar.gz .

      - name: Build Flutter desktop (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/client
        run: flutter build windows --release

      - name: Bundle backend (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item backend/target/release/trustrag-backend.exe apps/client/build/windows/x64/runner/Release/

      - name: Create Windows installer
        if: runner.os == 'Windows'
        working-directory: apps/client
        run: iscc windows/installer.iss

      - name: Package Windows portable
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path apps/client/build/windows/x64/runner/Release/* -DestinationPath apps/client/trustrag-windows-x64-portable.zip

      - name: Build Flutter desktop (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/client
        run: flutter build macos --release

      - name: Bundle backend (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_DIR="apps/client/build/macos/Build/Products/Release/client.app"
          cp backend/target/release/trustrag-backend "$APP_DIR/Contents/Resources/"
          cd apps/client/build/macos/Build/Products/Release
          tar czf ../../../../../trustrag-macos.tar.gz *.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.name }}-${{ github.sha }}
          path: |
            apps/client/trustrag-linux-x64.tar.gz
            apps/client/TrustRAG-Setup-Windows-x64.exe
            apps/client/trustrag-windows-x64-portable.zip
            apps/client/trustrag-macos.tar.gz
          if-no-files-found: warn
          retention-days: 7

  build-mobile:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: android
          - os: macos-latest
            name: ios

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java (Android)
        if: matrix.name == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android APK
        if: matrix.name == 'android'
        working-directory: apps/client
        run: flutter build apk --release

      - name: Select latest Xcode (iOS)
        if: matrix.name == 'ios'
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi

      - name: Build iOS (no codesign)
        if: matrix.name == 'ios'
        working-directory: apps/client
        run: flutter build ios --release --no-codesign

      - name: Package iOS
        if: matrix.name == 'ios'
        run: |
          cd apps/client/build/ios/iphoneos
          tar czf ../../../trustrag-ios.tar.gz Runner.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.name }}-${{ github.sha }}
          path: |
            apps/client/build/app/outputs/flutter-apk/app-release.apk
            apps/client/trustrag-ios.tar.gz
          if-no-files-found: warn
          retention-days: 7
