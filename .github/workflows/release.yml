name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Rust backend (desktop mode)
        working-directory: backend
        run: cargo build --release --no-default-features --features desktop

      - name: Build Linux desktop
        working-directory: apps/client
        run: flutter build linux --release

      - name: Bundle backend with Flutter app
        run: |
          cp backend/target/release/trustrag-backend apps/client/build/linux/x64/release/bundle/

      - name: Package Linux build
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ../../../../../trustrag-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-linux-x64
          path: apps/client/trustrag-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Rust backend (desktop mode)
        working-directory: backend
        run: cargo build --release --no-default-features --features desktop

      - name: Build Windows desktop
        working-directory: apps/client
        run: flutter build windows --release

      - name: Bundle backend with Flutter app
        run: |
          Copy-Item backend/target/release/trustrag-backend.exe apps/client/build/windows/x64/runner/Release/

      - name: Create Windows installer (Inno Setup)
        working-directory: apps/client
        run: |
          iscc windows/installer.iss

      - name: Package Windows portable
        run: |
          Compress-Archive -Path apps/client/build/windows/x64/runner/Release/* -DestinationPath apps/client/trustrag-windows-x64-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-windows-installer
          path: apps/client/TrustRAG-Setup-Windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-windows-portable
          path: apps/client/trustrag-windows-x64-portable.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Rust backend (desktop mode)
        working-directory: backend
        run: cargo build --release --no-default-features --features desktop

      - name: Build macOS app
        working-directory: apps/client
        run: flutter build macos --release

      - name: Bundle backend with macOS app
        run: |
          APP_DIR="apps/client/build/macos/Build/Products/Release/TrustRAG.app"
          cp backend/target/release/trustrag-backend "$APP_DIR/Contents/Resources/"

      - name: Package macOS build
        run: |
          cd apps/client/build/macos/Build/Products/Release
          tar czf ../../../../../trustrag-macos.tar.gz *.app

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-macos
          path: apps/client/trustrag-macos.tar.gz

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            echo "Selecting Xcode: $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build iOS (no codesign)
        working-directory: apps/client
        run: flutter build ios --release --no-codesign

      - name: Package iOS build
        run: |
          cd apps/client/build/ios/iphoneos
          tar czf ../../../trustrag-ios.tar.gz Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-ios
          path: apps/client/trustrag-ios.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Android APK
        working-directory: apps/client
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-android
          path: apps/client/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Web
        working-directory: apps/client
        run: flutter build web --release

      - name: Package Web build
        run: |
          cd apps/client/build/web
          tar czf ../../trustrag-web.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: trustrag-web
          path: apps/client/trustrag-web.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos, build-ios, build-android, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-alpha* ]] || [[ "$VERSION" == *-beta* ]] || [[ "$VERSION" == *-rc* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Release Notes
        run: node scripts/generate-release-notes.mjs "${{ steps.get_version.outputs.VERSION }}" > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TrustRAG v${{ steps.get_version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.get_version.outputs.IS_PRERELEASE == 'true' }}
          files: |
            artifacts/trustrag-linux-x64/trustrag-linux-x64.tar.gz
            artifacts/trustrag-windows-installer/TrustRAG-Setup-Windows-x64.exe
            artifacts/trustrag-windows-portable/trustrag-windows-x64-portable.zip
            artifacts/trustrag-macos/trustrag-macos.tar.gz
            artifacts/trustrag-ios/trustrag-ios.tar.gz
            artifacts/trustrag-android/app-release.apk
            artifacts/trustrag-web/trustrag-web.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
